version: "3.9"

services:

  # ──────────────────────────────────────────────────────────────────────────
  # 1. PostgreSQL
  # ──────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rul_postgres
    environment:
      POSTGRES_DB:       ${DB_NAME:-prognosai}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ruldb_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-prognosai}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────────────────
  # 2. RUL Prediction API
  # ──────────────────────────────────────────────────────────────────────────
  rul-api:
    image: ${DOCKER_HUB_USER:-amalsalilan}/rul-api:latest
    container_name: rul_api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8100:8000"
    environment:
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     ${DB_NAME:-prognosai}
      DB_USER:     ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-ruldb_secret}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Grafana
  # ──────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    container_name: rul_grafana
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED:   "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE:  "Viewer"
    volumes:
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q '\"database\": \"ok\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Grafana Init (one-shot provisioner — exits after dashboards are loaded)
  # ──────────────────────────────────────────────────────────────────────────
  grafana-init:
    image: ${DOCKER_HUB_USER:-amalsalilan}/grafana-init:latest
    container_name: rul_grafana_init
    build:
      context: .
      dockerfile: Dockerfile.grafana-init
    environment:
      GRAFANA_HOST:      http://grafana:3000
      GF_ADMIN_USER:     ${GF_ADMIN_USER:-admin}
      GF_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      DB_HOST:           postgres
      DB_PORT:           "5432"
      DB_NAME:           ${DB_NAME:-prognosai}
      DB_USER:           ${DB_USER:-postgres}
      DB_PASSWORD:       ${DB_PASSWORD:-ruldb_secret}
    depends_on:
      grafana:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
  grafana_data:
